apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: iris-api
  template:
    metadata:
      labels:
        app: iris-api
    spec:
      containers:
      - name: iris-api
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8000
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: iris-secrets
              key: api-key
        - name: MLFLOW_TRACKING_URI
          value: {{ .Values.config.mlflowTrackingUri | quote }}
        - name: MINIO_ENDPOINT
          value: {{ .Values.config.minioEndpoint | quote }}
        - name: MINIO_USER
          value: {{ .Values.config.minioUser | quote }}
        - name: MINIO_PASSWORD
          value: {{ .Values.config.minioPassword | quote }}
        volumeMounts:
        - name: models
          mountPath: {{ .Values.persistence.mountPath }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: {{ include "elite-iris-api.fullname" . }}-models
