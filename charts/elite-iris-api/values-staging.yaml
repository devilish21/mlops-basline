replicaCount: 2

image:
  repository: ghcr.io/veera/mlops/elite-iris-api
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: staging.elite-iris-api.local
      paths:
        - path: /
          pathType: ImplementationSpecific
