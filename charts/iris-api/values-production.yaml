replicaCount: 5

image:
  repository: ghcr.io/veera/mlops/iris-api
  pullPolicy: Always
  tag: "latest"

service:
  type: LoadBalancer
  port: 80

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.iris-pipeline.com
      paths:
        - path: /
          pathType: ImplementationSpecific
