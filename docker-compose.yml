services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /app/mlruns
    environment:
      - GUNICORN_CMD_ARGS=--forwarded-allow-ips="*" --proxy-allow-from="*" --timeout 120
    volumes:
      - ./mlruns:/app/mlruns

  minio:
    image: minio/minio:latest
    container_name: minio-s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=mlops_user
      - MINIO_ROOT_PASSWORD=mlops_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins_ci
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - .:/workspace
    depends_on:
      - mlflow
      - minio

  create_buckets:
    image: minio/mc
    container_name: minio_setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 mlops_user mlops_password) do echo '...waiting for minio...' && sleep 1; done;
      /usr/bin/mc mb myminio/dvc-storage || true;
      exit 0;
      "
    networks:
      - default

volumes:
  minio_data:
  jenkins_home:
